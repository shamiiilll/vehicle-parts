{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="section">
<h2>My Products</h2>

<div class="grid">
    {% for item in items %}
    <div class="card">
        <img src="{{ item.image.url }}" alt="{{ item.name }}">
        <h3>{{ item.name }}</h3>
        <p>Category: {{ item.category|title }}</p>
        <p>Price: ₹{{ item.price }}</p>
        <p>{{ item.description }}</p>
        <!-- Optional: Edit/Delete buttons -->
        <a href="{% url 'edit_product' item.id %}"><button>Edit</button></a>
        <a href="{% url 'delete_product' item.id %}"><button style="background:red; color:white; border:none; padding:8px 15px; border-radius:10px; cursor:pointer;">Delete</button></a>
    </div>
    {% empty %}
    <p>You have not added any products yet.</p>
    {% endfor %}
</div>
</section>
{% endblock %}
