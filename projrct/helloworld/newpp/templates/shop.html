{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop - SpareLink</title>
    <link rel="stylesheet" href="{% static 'css/shop.css' %}">
</head>
<body>
    <h1>Our Products</h1>
    <div class="items-container">
       
        {% for item in items %}
            <div class="item-card">
                <img src="{{ item.image.url }}" alt="{{ item.name }}">
                <h3>{{ item.name }}</h3>
                <p>Price: ₹{{ item.price }}</p>
            </div>
        {% endfor %}
    </div>
</body>
</html>
