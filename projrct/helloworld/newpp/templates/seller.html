<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sell Your Parts | SpareLink</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f5f5f7;
}

/* HEADER */

header{
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.navbar{
max-width:1100px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
}

.logo{
font-size:22px;
font-weight:700;
}

nav a{
margin-left:25px;
text-decoration:none;
color:#333;
}

/* FORM */

.container{
max-width:900px;
margin:60px auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

.container h2{
margin-bottom:30px;
font-size:32px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:6px;
font-weight:500;
}

input, select, textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:14px;
}

textarea{
height:120px;
resize:none;
}

.upload{
border:2px dashed #ccc;
padding:25px;
text-align:center;
border-radius:12px;
cursor:pointer;
}

button{
margin-top:15px;
padding:14px 35px;
border:none;
background:#0071e3;
color:white;
font-size:16px;
border-radius:30px;
cursor:pointer;
}

button:hover{
background:#005ec2;
}

</style>

</head>

<header>

<div class="navbar">
<div class="logo">SpareLink</div>

<script>

function filterBrand() {

let input = document.getElementById("brandSearch").value.toLowerCase();
let select = document.getElementById("brandSelect");
let options = select.getElementsByTagName("option");

for (let i = 0; i < options.length; i++) {

let txt = options[i].textContent.toLowerCase();

if (txt.includes(input)) {
options[i].style.display = "";
} else {
options[i].style.display = "none";
}

}

}

function filterParts() {

let input = document.getElementById("partSearch").value.toLowerCase();
let select = document.getElementById("partSelect");
let options = select.getElementsByTagName("option");

for (let i = 0; i < options.length; i++) {

let txt = options[i].textContent.toLowerCase();

if (txt.includes(input)) {
options[i].style.display = "";
} else {
options[i].style.display = "none";
}

}

}

</script>
