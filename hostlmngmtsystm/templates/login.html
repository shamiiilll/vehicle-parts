{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hostel Management System - Login</title>
   

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>



    <div class="auth-container">

        <div class="auth-card">

            <div class="auth-header">
                <i class="fas fa-building fa-3x"
                    style="color: var(--primary-color); margin-bottom: 15px;"></i>

                <h1>Welcome Back</h1>

                <p>Hostel Management System Login</p>
            </div>

            <form id="login-form" method="POST">

                {% csrf_token %}
                  {% if messages %}
    {% for message in messages %}
        <div class="form-error">
            <i class="fas fa-exclamation-circle"></i>
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
                <div class="form-group">
                    <label for="login-role">Login As</label>

                    <select id="login-role" name="role" required>
                        <option value="student">Student</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="login-email">Email or Username</label>

                    <input type="text"
                        id="login-email"
                        name="username"
                        placeholder="Enter your username"
                        required>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>

                    <input type="password"
                        id="login-password"
                        name="password"
                        placeholder="Enter your password"
                        required>
                </div>

                <button type="submit" class="btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Login
                </button>

            </form>

            <div class="auth-switch">
                <p>
                    Don't have an account?

                    <a href="{% url 'register' %}">
                        Register here
                    </a>
                </p>
            </div>

        </div>

    </div>

</body>
</html>
