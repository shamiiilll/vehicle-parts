<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f5f5f7;
}

/* HEADER */

header{
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.navbar{
max-width:1100px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
}

.logo{
font-size:22px;
font-weight:700;
}

nav a{
margin-left:25px;
text-decoration:none;
color:#333;
}

/* FORM */

.container{
max-width:900px;
margin:60px auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

.container h2{
margin-bottom:30px;
font-size:32px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:6px;
font-weight:500;
}

input, select, textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:14px;
}

textarea{
height:120px;
resize:none;
}

.upload{
border:2px dashed #ccc;
padding:25px;
text-align:center;
border-radius:12px;
cursor:pointer;
}

button{
margin-top:15px;
padding:14px 35px;
border:none;
background:#0071e3;
color:white;
font-size:16px;
border-radius:30px;
cursor:pointer;
}

button:hover{
background:#005ec2;
}
/* Vehicle Type */

.vehicle-type{
display:flex;
gap:20px;
margin-top:10px;
}

.vehicle-card{
padding:12px 25px;
border:2px solid #ddd;
border-radius:12px;
cursor:pointer;
font-weight:500;
transition:0.3s;
}

.vehicle-card:hover{
border-color:#0071e3;
background:#f0f6ff;
}

.vehicle-card input{
margin-right:8px;
}

/* Form focus effect */

input:focus,
select:focus,
textarea:focus{
outline:none;
border-color:#0071e3;
box-shadow:0 0 0 2px rgba(0,113,227,0.15);
}

/* Upload hover */

.upload:hover{
border-color:#0071e3;
background:#f9fbff;
}

/* Button improvement */

button{
width:100%;
font-weight:600;
letter-spacing:0.5px;
}

/* Smooth page feel */

.container{
transition:0.3s;
}
.dropdown-search{
display:flex;
border:1px solid #ccc;
border-radius:6px;
overflow:hidden;
}

.dropdown-search input{
flex:1;
border:none;
padding:10px;
}

.dropdown-search button{
width:40px;
border:none;
background:#f2f2f2;
cursor:pointer;
font-size:16px;
}

.dropdown-search button:hover{
background:#ddd;
}

select{
width:100%;
margin-top:5px;
}
.search-box{
position:relative;
width:100%;
}

.search-box input{
width:100%;
padding:10px;
padding-right:30px;
border:1px solid #ccc;
border-radius:6px;
}

.search-box span{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:14px;
color:#555;
}
</style>

</head>

<script>

function filterBrand() {

let input = document.getElementById("brandSearch").value.toLowerCase();
let select = document.getElementById("brandSelect");
let options = select.getElementsByTagName("option");

for (let i = 0; i < options.length; i++) {

let txt = options[i].textContent.toLowerCase();

if (txt.includes(input)) {
options[i].style.display = "";
} else {
options[i].style.display = "none";
}

}

}

function filterParts() {

let input = document.getElementById("partSearch").value.toLowerCase();
let select = document.getElementById("partSelect");
let options = select.getElementsByTagName("option");

for (let i = 0; i < options.length; i++) {

let txt = options[i].textContent.toLowerCase();

if (txt.includes(input)) {
options[i].style.display = "";
} else {
options[i].style.display = "none";
}

}

}
function previewImage(event){

let preview = document.getElementById("preview");

preview.src = URL.createObjectURL(event.target.files[0]);

preview.style.display = "block";

}
function filterVehicle(type){

let carBrands = document.getElementById("carBrands");
let bikeBrands = document.getElementById("bikeBrands");

let carParts = document.querySelectorAll("#partSelect optgroup[label^='Car']");
let bikeParts = document.querySelectorAll("#partSelect optgroup[label^='Bike']");

if(type === "car"){

carBrands.style.display = "block";
bikeBrands.style.display = "none";

carParts.forEach(p => p.style.display = "block");
bikeParts.forEach(p => p.style.display = "none");

}

else{

carBrands.style.display = "none";
bikeBrands.style.display = "block";

carParts.forEach(p => p.style.display = "none");
bikeParts.forEach(p => p.style.display = "block");

}

}
function toggleBrand(){

let brand = document.getElementById("brandSelect");

if(brand.style.display === "none"){
brand.style.display = "block";
}else{
brand.style.display = "none";
}

}

function toggleParts(){

let parts = document.getElementById("partSelect");

if(parts.style.display === "none"){
parts.style.display = "block";
}else{
parts.style.display = "none";
}

}
function selectBrand(){

let select = document.getElementById("brandSelect");
let input = document.getElementById("brandSearch");

input.value = select.value;

select.style.display = "none";

}
function toggleBrand(){

let brand = document.getElementById("brandSelect");

if(brand.style.display === "none"){
brand.style.display = "block";
}
else{
brand.style.display = "none";
}

}
function selectPart(){

let select = document.getElementById("partSelect");
let input = document.getElementById("partSearch");

input.value = select.value;

select.style.display = "none";

}
function toggleBrand(){
let brand = document.getElementById("brandSelect");
brand.style.display = brand.style.display === "none" ? "block" : "none";
}

function toggleParts(){
let parts = document.getElementById("partSelect");
parts.style.display = parts.style.display === "none" ? "block" : "none";
}

function setBrand(value){
document.getElementById("brandSearch").value = value;
document.getElementById("brandSelect").style.display = "none";
}

function setPart(value){
document.getElementById("partSearch").value = value;
document.getElementById("partSelect").style.display = "none";
}





</script>
