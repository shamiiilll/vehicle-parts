<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hostel Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<style>
body{
    background:#0f0f0f;
    color:white;
    font-family: 'Poppins', sans-serif;
}

/* NAVBAR */
.navbar{
    background:#000;
    border-bottom:1px solid #d4af37;
}

/* SIDEBAR */
.sidebar{
    height:100vh;
    background:#000;
    padding:20px;
    position:fixed;
    width:220px;
}

.sidebar h4{
    color:#d4af37;
    margin-bottom:20px;
}

.sidebar a{
    display:block;
    color:#ccc;
    padding:10px;
    border-radius:10px;
    text-decoration:none;
    margin-bottom:5px;
}

.sidebar a:hover{
    background:#d4af37;
    color:black;
}

/* CONTENT */
.content{
    margin-left:240px;
    padding:20px;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.05);
    border-radius:15px;
    border:none;
    transition:0.3s;
}
.card:hover{
    transform:scale(1.02);
    box-shadow:0 0 15px #d4af37;
}

/* BUTTON */
.btn-gold{
    background:#d4af37;
    color:black;
}
.btn-gold:hover{
    background:#b8962e;
}

/* INPUTS */
input, textarea{
    background: rgba(255,255,255,0.08) !important;
    border: 1px solid rgba(212,175,55,0.3) !important;
    color: white !important;
}

input:focus, textarea:focus{
    box-shadow: 0 0 10px #d4af37;
}

/* TABLE */
.table{
    background: rgba(255,255,255,0.03);
    border-radius:10px;
    overflow:hidden;
}

/* TABLE ROW HOVER */
.table tr:hover{
    background: rgba(212,175,55,0.1);
}

/* HEADINGS */
h2{
    font-weight:bold;
    letter-spacing:1px;
}

/* FORM BOX */
.form-box{
    background: rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.sidebar{
    height:100vh;
    width:80px;
    background:#000;
    position:fixed;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
}

.sidebar a{
    font-size:22px;
    color:#888;
    margin:18px 0;
    text-decoration:none;
    transition:0.3s;
}

.sidebar a:hover{
    color:#d4af37;
    transform:scale(1.15);
}

/* active icon effect */
.sidebar a.active{
    color:#d4af37;
}

.table td, .table th{
    padding:12px;
}

.badge{
    font-size:12px;
    padding:6px 10px;
}

.btn-outline-light{
    border-color:#d4af37;
    color:#d4af37;
}

.btn-outline-light:hover{
    background:#d4af37;
    color:black;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand">🏨 Hostel Management</span>
</nav>

<div class="sidebar">

<a href="{% url 'dashboard' %}">
    <i class="bi bi-grid"></i>
</a>

<a href="{% url 'rooms' %}">
    <i class="bi bi-building"></i>
</a>

<a href="{% url 'fees' %}">
    <i class="bi bi-cash-stack"></i>
</a>

<a href="{% url 'complaints' %}">
    <i class="bi bi-exclamation-circle"></i>
</a>

<a href="{% url 'notices' %}">
    <i class="bi bi-megaphone"></i>
</a>

<a href="{% url 'logout' %}">
    <i class="bi bi-box-arrow-right"></i>
</a>

</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
