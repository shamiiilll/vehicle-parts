<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* Body and background */
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #000000, #1a1a1a);
    font-family: 'Poppins', sans-serif;
}

/* Glassmorphic card */
.card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 40px 30px;
    width: 360px;
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
    border: 1px solid rgba(212, 175, 55, 0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 40px rgba(212, 175, 55, 0.8);
}

/* Heading */
h3 {
    color: #d4af37;
    text-align: center;
    margin-bottom: 30px;
    letter-spacing: 1px;
}

/* Inputs */
input.form-control {
    background: rgba(255, 255, 255, 0.1);
    border: none;
    border-radius: 10px;
    color: #fff;
    padding: 12px 15px;
    margin-bottom: 20px;
    transition: background 0.3s ease, box-shadow 0.3s ease;
}
input.form-control::placeholder {
    color: rgba(255, 255, 255, 0.6);
}
input.form-control:focus {
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
    outline: none;
}

/* Button */
.btn {
    background: #d4af37;
    color: black;
    font-weight: bold;
    border-radius: 10px;
    padding: 12px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.7);
}

/* Footer text */
.card p {
    color: rgba(212, 175, 55, 0.8);
    text-align: center;
    margin-top: 15px;
    font-size: 0.9rem;
}

/* Optional: animate background particles */
@keyframes pulse {
    0% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
    50% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.7); }
    100% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
}
.card {
    animation: pulse 3s infinite;
}
</style>
</head>

<body>

<div class="card">
<h3>Welcome Back</h3>

<form method="POST">
{% csrf_token %}

<input name="username" class="form-control" placeholder="Username" required>
<input name="password" type="password" class="form-control" placeholder="Password" required>

<button type="submit" class="btn w-100">Login</button>

<p>Don't have an account? <a href="{% url 'register' %}" style="color:#d4af37; text-decoration:underline;">Sign Up</a></p>
</form>
</div>

</body>
</html>
